[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "bizlens"
version = "2.0.0"
description = "Integrated Analytics Platform - Descriptive, Diagnostic & Predictive Analytics with Sample vs Population Distinction"
readme = "README_FINAL.md"
requires-python = ">=3.8"
license = {text = "MIT"}
authors = [
    {name = "Sudhanshu Singh", email = "cc9n8y8tqc@privaterelay.appleid.com"}
]

keywords = [
    "statistics",
    "analytics",
    "education",
    "visualization",
    "data-science",
]

classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Education",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
]

dependencies = [
    "numpy>=1.21.0",
    "pandas>=1.3.0",
    "polars>=0.14.0",
    "narwhals>=0.1.0",
    "matplotlib>=3.3.0",
    "seaborn>=0.11.0",
    "scipy>=1.7.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=6.0",
    "pytest-cov>=2.12.0",
    "flake8>=3.9.0",
]

[project.urls]
Homepage = "https://github.com/solutiongate-learn/bizlens"
Documentation = "https://github.com/solutiongate-learn/bizlens#readme"
Repository = "https://github.com/solutiongate-learn/bizlens"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
