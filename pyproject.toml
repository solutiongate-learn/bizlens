[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "bizlens"
version = "2.2.8"
description = "Educational descriptive analytics library with rich visualizations, outlier detection, normality tests, and synthetic data generation for teaching and business analysis."
readme = "README_FINAL.md"
requires-python = ">=3.9"
license = {text = "MIT"}
authors = [
    {name = "Sudhanshu Singh", email = "cc9n8y8tqc@privaterelay.appleid.com"}
]
keywords = [
    "analytics", "statistics", "education", "business-intelligence",
    "descriptive-analytics", "eda", "data-visualization", "outlier-detection",
    "normality-test", "synthetic-data", "process-mining", "teaching",
    "sample-vs-population", "skewness", "data-science"
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Education",
    "Intended Audience :: Science/Research",
    "Intended Audience :: Developers",
    "Topic :: Scientific/Engineering :: Mathematics",
    "Topic :: Scientific/Engineering :: Information Analysis",
    "Topic :: Education",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Operating System :: OS Independent",
]

dependencies = [
    "numpy>=1.21.0",
    "polars>=0.18.0",
    "narwhals>=1.0.0",
    "pandas>=1.5.0",
    "scipy>=1.9.0",
    "matplotlib>=3.6.0",
    "seaborn>=0.12.0",
    "rich>=13.0.0",
]

[project.optional-dependencies]
# Process mining support
process-mining = ["pm4py>=2.7.0"]

# Interactive visualizations
interactive = ["plotly>=5.0.0"]

# Full installation
full = [
    "pm4py>=2.7.0",
    "plotly>=5.0.0",
]

# Development tools
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "black>=23.0",
    "flake8>=6.0",
]

[project.urls]
Homepage = "https://github.com/solutiongate-learn/bizlens"
Documentation = "https://github.com/solutiongate-learn/bizlens#readme"
Repository = "https://github.com/solutiongate-learn/bizlens"
"Bug Tracker" = "https://github.com/solutiongate-learn/bizlens/issues"
PyPI = "https://pypi.org/project/bizlens/"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]