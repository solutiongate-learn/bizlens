[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "bizlens"
version = "2.2.0"
description = "Integrated Analytics Platform — Descriptive, Diagnostic, Predictive, Prescriptive & Simulation Analytics"
readme = "README_FINAL.md"
requires-python = ">=3.8"
license = {text = "MIT"}
authors = [
    {name = "Sudhanshu Singh", email = "cc9n8y8tqc@privaterelay.appleid.com"}
]

keywords = [
    "analytics", "statistics", "education", "business-intelligence",
    "descriptive-analytics", "diagnostic-analytics", "predictive-analytics",
    "prescriptive-analytics", "machine-learning", "optimization",
    "monte-carlo", "simulation", "six-sigma", "process-capability",
    "operations-research", "text-analytics", "wordcloud", "sentiment",
    "gantt-chart", "network-diagram", "sample-vs-population",
    "data-science", "visualization", "regression", "hypothesis-testing"
]

classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Education",
    "Intended Audience :: Science/Research",
    "Intended Audience :: Developers",
    "Topic :: Scientific/Engineering :: Mathematics",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Scientific/Engineering :: Information Analysis",
    "Topic :: Education",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Operating System :: OS Independent",
]

dependencies = [
    # Core data manipulation
    "numpy>=1.21.0",
    "pandas>=1.3.0",
    "polars>=0.14.0",
    "narwhals>=0.1.0",
    # Statistics
    "scipy>=1.7.0",
    # Visualization
    "matplotlib>=3.3.0",
    "seaborn>=0.11.0",
    # Machine Learning
    "scikit-learn>=1.0.0",
    # Statistical modeling
    "statsmodels>=0.13.0",
    # Optimization / Operations Research
    "PuLP>=2.7.0",
    # Graph / Network analysis
    "networkx>=2.6.0",
    # Rich terminal output
    "rich>=12.0.0",
]

[project.optional-dependencies]
# Text analytics
text = [
    "wordcloud>=1.8.0",
    "vaderSentiment>=3.3.0",
    "textblob>=0.17.0",
]
# Optimization extras
optimization = [
    "pyomo>=6.0.0",
    "cvxpy>=1.2.0",
    "gekko>=1.0.0",
    "pymoo>=0.6.0",
]
# Simulation extras
simulation = [
    "simpy>=4.0.0",
]
# Dataset sources
kaggle = [
    "kaggle>=1.5.0",
]
openml = [
    "openml>=0.14.0",
]
worldbank = [
    "wbgapi>=1.0.0",
]
# Interactive visualization
interactive = [
    "plotly>=5.0.0",
    "altair>=4.0.0",
    "ipywidgets>=7.0.0",
]
# Development
dev = [
    "pytest>=6.0",
    "pytest-cov>=2.12.0",
    "flake8>=3.9.0",
    "black>=21.5b0",
    "mypy>=0.910",
]
# Full install (all optional features)
full = [
    "wordcloud>=1.8.0",
    "vaderSentiment>=3.3.0",
    "textblob>=0.17.0",
    "pyomo>=6.0.0",
    "cvxpy>=1.2.0",
    "pymoo>=0.6.0",
    "simpy>=4.0.0",
    "kaggle>=1.5.0",
    "openml>=0.14.0",
    "wbgapi>=1.0.0",
    "plotly>=5.0.0",
    "altair>=4.0.0",
]

[project.urls]
Homepage = "https://github.com/solutiongate-learn/bizlens"
Documentation = "https://github.com/solutiongate-learn/bizlens#readme"
Repository = "https://github.com/solutiongate-learn/bizlens"
"Bug Tracker" = "https://github.com/solutiongate-learn/bizlens/issues"
PyPI = "https://pypi.org/project/bizlens/"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
